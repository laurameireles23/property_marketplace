version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - bundle_cache:/usr/local/bundle
      - node_modules:/workspace/node_modules
    command: sleep infinity
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/property_marketplace_development
    depends_on:
      - db
    ports:
      - "3000:3000"
    networks:
      - property_marketplace

  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=postgres
      - POSTGRES_DB=property_marketplace_development
    ports:
      - "5432:5432"
    networks:
      - property_marketplace

volumes:
  postgres_data:
  bundle_cache:
  node_modules:

networks:
  property_marketplace:
    driver: bridge